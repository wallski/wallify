<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#1e1e2c"/>
            <stop offset="100%" stop-color="#0b0b10"/>
        </radialGradient>
        
        <!-- Glowing Neons -->
        <linearGradient id="purpleNeon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ab7fe6"/>
            <stop offset="100%" stop-color="#bd93f9"/>
        </linearGradient>
        
        <linearGradient id="cyanNeon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8ae9fd"/>
            <stop offset="100%" stop-color="#50fa7b"/>
        </linearGradient>
        
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
        </radialGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <!-- Base Canvas Background -->
    <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
    
    <!-- Outer Cyber Ring -->
    <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#252538" stroke-width="1.5" stroke-dasharray="24 16"/>

    <!-- Subtle Center Radial Glow -->
    <circle cx="256" cy="256" r="180" fill="url(#centerGlow)"/>

    <!-- Vinyl Grooves (Premium Minimal soundwave rings) -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="#1d1d2b" stroke-width="6"/>
    <circle cx="256" cy="256" r="130" fill="none" stroke="#181824" stroke-width="4" stroke-dasharray="180 40 20 60"/>
    <circle cx="256" cy="256" r="100" fill="none" stroke="#151520" stroke-width="3" stroke-dasharray="80 120"/>

    <!-- Glowing Abstract Waveform forming a "W" and Note -->
    <g filter="url(#glow)">
        <!-- The Left Arc of the "W" and Music Wave -->
        <path d="M 140 180 
                 C 140 140, 190 120, 220 160 
                 C 250 200, 200 320, 256 360 
                 C 300 390, 360 320, 370 280" 
              fill="none" stroke="url(#purpleNeon)" stroke-width="24" stroke-linecap="round"/>
              
        <!-- The Right Intersecting Arc completing the dynamic sound wave -->
        <path d="M 372 332 
                 C 372 372, 322 392, 292 352 
                 C 262 312, 312 192, 256 152 
                 C 212 122, 152 192, 142 232" 
              fill="none" stroke="url(#cyanNeon)" stroke-width="16" stroke-linecap="round" opacity="0.85"/>
              
        <!-- Core Glowing Pulsing Beats (Music Equalizer Nodes) -->
        <circle cx="256" cy="256" r="28" fill="#ffffff" opacity="0.15"/>
        <circle cx="256" cy="256" r="12" fill="#ffffff"/>
        
        <circle cx="140" cy="180" r="10" fill="#ab7fe6"/>
        <circle cx="370" cy="280" r="10" fill="#8ae9fd"/>
    </g>
</svg>
