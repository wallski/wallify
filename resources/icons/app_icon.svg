<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#9a6fd6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Outer ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" stroke="url(#accent)" stroke-width="4" fill="none" opacity="0.3"/>

  <!-- Sound wave circles -->
  <circle cx="256" cy="256" r="160" stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.15"/>
  <circle cx="256" cy="256" r="120" stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.25"/>
  <circle cx="256" cy="256" r="80" stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Center play button / vinyl record -->
  <circle cx="256" cy="256" r="60" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="8" fill="url(#accent)"/>

  <!-- Sound wave bars -->
  <rect x="120" y="216" width="12" height="80" rx="6" fill="url(#accent)" opacity="0.8"/>
  <rect x="142" y="196" width="12" height="120" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="164" y="226" width="12" height="60" rx="6" fill="url(#accent)" opacity="0.7"/>

  <rect x="336" y="226" width="12" height="60" rx="6" fill="url(#accent)" opacity="0.7"/>
  <rect x="358" y="196" width="12" height="120" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="380" y="216" width="12" height="80" rx="6" fill="url(#accent)" opacity="0.8"/>
</svg>